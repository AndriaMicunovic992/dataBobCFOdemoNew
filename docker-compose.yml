version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: databobiq
      POSTGRES_PASSWORD: databobiq
      POSTGRES_DB: databobiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U databobiq -d databobiq"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
